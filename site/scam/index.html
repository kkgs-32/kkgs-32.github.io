<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>稼ぐ方法</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
</head>

<body>
  <section class="hero is-fullheight" style="background: url(https://kkgs-32.github.io/site/scam/scam.jpg) center">
    <div class="hero-body">
      <div id="app" class="container">
        <div id="notification" class="notification" style="display: none;">
          <progress id="progress" class="progress is-small is-primary" max="100">0%</progress>
          <p id="message" class="is-size-4">写真を撮影しました</p>
        </div>
        <p class="is-size-1">稼ぐ方法</p>
        <p class="is-size-3">何もしないで月240万円稼ぐ方法があります。</p>
        <p class="is-size-3">そんな夢のような方法があります。。あなたも億万長者になりましょう。</p>
        <button id="moveBtn" class="button is-primary is-large">続きを見る</button>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      alert("これはワンクリック詐欺サイトのデモページです。");

      document.getElementById("moveBtn").addEventListener("click", function () {
        const se = new Audio("https://kkgs-32.github.io/site/scam/scam.mp3");
        se.play();

        const notification = document.getElementById("notification");
        const message = document.getElementById("message");
        notification.style.display = "block";

        const messages = [
          "写真を送信中...",
          "端末情報を取得中...",
          "IPアドレスを取得中...",
          "IPアドレスから現在地を特定中...",
          "情報送信中..."
        ];

        messages.forEach((msg, index) => {
          setTimeout(() => { message.textContent = msg; }, (index + 1) * 800);
        });

        setTimeout(() => {
          window.location.href = "https://kkgs-32.github.io/site/scam/invoice.html";
        }, messages.length * 800 + 800);
      });
    });
  </script>
</body>

</html>
